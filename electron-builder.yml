appId: com.duiwei.scrumboard
productName: DuiWei Scrum Board
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
asar: true
mac:
  target:
    - dmg
  category: public.app-category.productivity
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
